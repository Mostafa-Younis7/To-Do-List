<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/style.css">
    <title>To-Do List</title>
</head>

<body>
    <main>
        <div class="container">
            <h2>My To-Do List</h2>
            <p class="tasks-counter">0 tasks remaining</p>
            <form class="write-tasks">
                <input type=" text" class="inp-add-task form-control" placeholder="Add a new task...">
                <button class="btn btn-primary btn-add-task">
                    <i class="fa-solid fa-plus"></i>
                    Add</button>
            </form>
            <div class="tasks">
                <p class="no-tasks">There are no tasks yet.</p>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
